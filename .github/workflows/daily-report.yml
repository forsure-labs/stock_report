name: 데일리 종목 리포트

on:
  schedule:
    # 22:00 UTC = 07:00 KST (다음날). 월~금 UTC = 화~토 07:00 KST → 미국장 마감 다음 아침.
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      ticker:
        description: "특정 티커만 실행 (비워두면 tickers.json 전체)"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  # ── 1. tickers.json 을 읽어 매트릭스로 변환 ────────────────────────────
  config:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.load.outputs.matrix }}
      date: ${{ steps.load.outputs.date }}
      weekday: ${{ steps.load.outputs.weekday }}
    steps:
      - uses: actions/checkout@v4

      - id: load
        name: 종목 목록 및 KST 날짜 계산
        env:
          ONLY: ${{ inputs.ticker }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          from datetime import datetime, timedelta, timezone

          KST = timezone(timedelta(hours=9))
          now = datetime.now(KST)
          weekday = "월화수목금토일"[now.weekday()] + "요일"

          cfg = json.load(open("config/tickers.json", encoding="utf-8"))
          rows = [t for t in cfg["tickers"] if t.get("enabled", True)]

          only = os.environ.get("ONLY", "").strip().upper()
          if only:
              rows = [t for t in rows if t["ticker"].upper() == only]
          if not rows:
              raise SystemExit(f"실행할 종목이 없습니다 (필터: {only or '없음'})")

          print("matrix=" + json.dumps({"include": rows}))
          print("date=" + now.strftime("%Y-%m-%d"))
          print("weekday=" + weekday)
          PY

  # ── 2. 종목별 리포트 생성 (병렬) ──────────────────────────────────────
  report:
    needs: config
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.config.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: 지시문 렌더링
        env:
          TICKER: ${{ matrix.ticker }}
          COMPANY: ${{ matrix.company }}
          SECTOR: ${{ matrix.sector }}
          EXCHANGE: ${{ matrix.exchange }}
          CURRENCY: ${{ matrix.currency }}
          DATE: ${{ needs.config.outputs.date }}
          WEEKDAY: ${{ needs.config.outputs.weekday }}
        run: |
          mkdir -p "reports/${TICKER}"
          python3 - <<'PY'
          import os, pathlib
          tpl = pathlib.Path("prompts/daily-report.md").read_text(encoding="utf-8")
          keys = ["TICKER", "COMPANY", "SECTOR", "EXCHANGE", "CURRENCY", "DATE", "WEEKDAY"]
          base = f"reports/{os.environ['TICKER']}/{os.environ['DATE']}"
          out = f"{base}.md"
          for k in keys:
              tpl = tpl.replace("{{" + k + "}}", os.environ[k])
          tpl = tpl.replace("{{OUTPUT_PATH}}", out)
          tpl = tpl.replace("{{DATA_PATH}}", f"{base}.data.json")
          pathlib.Path(".claude-prompt.md").write_text(tpl, encoding="utf-8")
          print(f"지시문 렌더링 완료 → 산출물 경로: {out}")
          PY

      # 토큰 위생 검사 (값은 절대 찍지 않는다).
      # 토큰에 줄바꿈/공백이 섞이면 인증이 조용히 실패하고, SDK 는 원인과 무관한
      # AJV 스키마 에러로 즉시 죽는다 (is_error:true / num_turns:1 / cost:0).
      # https://github.com/anthropics/claude-code-action/issues/872
      - name: 토큰 위생 검사
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN 이 비어 있습니다. Repository secrets 에 이름이 정확히 등록됐는지 확인하세요."
            exit 1
          fi

          # 토큰의 일부라도 출력하지 않는다. GitHub 은 시크릿 전문만 마스킹하므로
          # 부분 문자열은 공개 로그에 그대로 남는다.
          echo "길이: ${#TOKEN}자"

          # 공백·줄바꿈·탭이 섞여 있으면 여기서 잡는다
          case "$TOKEN" in
            *[[:space:]]*)
              echo "::error::토큰에 공백 또는 줄바꿈이 섞여 있습니다. 이게 인증 실패의 원인입니다."
              echo "  Mac 에서 클립보드를 세탁한 뒤 Secret 을 다시 등록하세요:"
              echo "    pbpaste | tr -d '[:space:]' | pbcopy"
              exit 1
              ;;
          esac

          case "$TOKEN" in
            sk-ant-oat*) echo "형식 OK — claude setup-token 토큰, 공백 없음" ;;
            sk-ant-api*)
              echo "::error::이건 API 키입니다. 워크플로우 입력을 anthropic_api_key 로 바꿔야 합니다."
              exit 1
              ;;
            *)
              echo "::error::예상 못 한 형식입니다. 토큰이 잘렸거나 다른 값일 수 있습니다."
              exit 1
              ;;
          esac

      # 사전 데이터 수집 (fetcher).
      # 순수 조회값(주가·내부자거래·금리·섹터지수)을 API 에서 결정론적으로 받아
      # reports/{티커}/{날짜}.data.json 으로 떨군다. Claude 는 이 숫자를 '확정 사실'로
      # 쓰고 재검색하지 않는다 → 숫자 환각 제거 + 토큰 절감.
      # fetcher 가 일부 실패해도 워크플로우는 계속한다(null 로 표기되고 Claude 가 보완).
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 데이터 수집 (fetcher)
        continue-on-error: true
        env:
          TICKER: ${{ matrix.ticker }}
          DATE: ${{ needs.config.outputs.date }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          pip install --quiet yfinance
          python scripts/fetch.py --ticker "$TICKER" --date "$DATE" \
            --out "reports/${TICKER}/${DATE}.data.json"

      - name: Claude 리서치 실행
        id: claude1
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            리포지토리 루트의 `.claude-prompt.md` 파일을 읽고, 그 안의 지시문을 처음부터 끝까지 그대로 수행해라.
            리포트는 반드시 **Write 툴로 파일 저장**해야 한다. 본문을 채팅(최종 메시지)으로만
            출력하고 끝내면 실패다 — 파일이 생성되지 않는다.
            저장 직후 `ls -la` 로 파일이 실제로 존재하는지 확인하고, 없으면 다시 저장하라.
          claude_args: |
            --allowedTools "WebSearch,WebFetch,Read,Write,Edit,Glob,Grep,Task,Bash(mkdir:*),Bash(ls:*)"
            --permission-mode acceptEdits
            --model claude-opus-4-8
            --max-turns 120

      # 모델이 Write 를 건너뛰면(비결정적) 파일이 안 생긴다. 그 경우만 1회 재시도한다.
      # 재시도도 데이터 수집(fetcher)은 이미 끝났으므로 리서치·저장만 다시 한다.
      - name: 저장 여부 확인
        id: check
        env:
          REPORT: reports/${{ matrix.ticker }}/${{ needs.config.outputs.date }}.md
        run: |
          # 파일 없음 + 껍데기(40줄 미만) 둘 다 재시도 대상으로 본다.
          lines=$([ -f "$REPORT" ] && wc -l < "$REPORT" || echo 0)
          if [ "$lines" -ge 40 ]; then
            echo "missing=false" >> "$GITHUB_OUTPUT"
            echo "1차 실행에서 리포트 생성됨: $REPORT ($lines 줄)"
          else
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "::warning::1차 리포트 없음/너무 짧음($lines 줄, 모델이 Write 생략·미완성 추정) — 재시도한다: $REPORT"
          fi

      - name: Claude 리서치 재시도
        if: steps.check.outputs.missing == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            `.claude-prompt.md` 의 지시문을 처음부터 끝까지 다시 수행해 리포트를 완성해라.
            ⚠️ 직전 시도의 결과물이 없거나 빈 껍데기였다. 이번에는 리서치를 모두 마친 뒤
            **9개 섹션을 전부 채운 완성 리포트**를 Write 툴로 지시문의 경로에 저장해라.
            빈 골격이나 일부만 채운 파일을 저장하지 마라. 기존 파일이 있으면 완성본으로 덮어써라.
            저장 후 Read 로 9개 섹션이 모두 있고 충분히 긴지 확인하고, 부족하면 다시 저장하라.
            리포트를 채팅으로만 출력하는 것은 실패다.
          claude_args: |
            --allowedTools "WebSearch,WebFetch,Read,Write,Edit,Glob,Grep,Task,Bash(mkdir:*),Bash(ls:*)"
            --permission-mode acceptEdits
            --model claude-opus-4-8
            --max-turns 120

      - name: 산출물 검증
        env:
          REPORT: reports/${{ matrix.ticker }}/${{ needs.config.outputs.date }}.md
        run: |
          if [ ! -s "$REPORT" ]; then
            echo "::error::리포트가 생성되지 않았습니다: $REPORT"
            ls -laR reports/ || true
            exit 1
          fi
          # 최소 분량 확인 — 빈 껍데기 리포트가 배포되는 걸 막는다
          lines=$(wc -l < "$REPORT")
          echo "리포트 생성됨: $REPORT ($lines 줄)"
          [ "$lines" -ge 40 ] || { echo "::error::리포트가 너무 짧습니다 ($lines 줄)"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.ticker }}
          path: reports/${{ matrix.ticker }}/${{ needs.config.outputs.date }}.md
          retention-days: 7

  # ── 3. 커밋 · Pages 배포 · 텔레그램 전송 ──────────────────────────────
  publish:
    needs: [config, report]
    if: always() && needs.config.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # merge-multiple 을 쓰지 않는다: 아티팩트 내부 경로는 평평해지므로
      # 티커 정보가 아티팩트 이름(report-{티커})에만 남는다.
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
          pattern: report-*

      - name: 리포트 수집
        id: collect
        run: |
          count=0
          for dir in /tmp/artifacts/report-*/; do
            [ -d "$dir" ] || continue
            ticker=$(basename "$dir")
            ticker=${ticker#report-}
            mkdir -p "reports/${ticker}"
            for md in "$dir"*.md; do
              [ -f "$md" ] || continue
              cp -f "$md" "reports/${ticker}/"
              echo "  수집: reports/${ticker}/$(basename "$md")"
              count=$((count + 1))
            done
          done
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "이번 실행에서 생성된 리포트: ${count}개"

      - uses: actions/setup-python@v5
        if: steps.collect.outputs.count != '0'
        with:
          python-version: "3.12"

      - name: HTML 렌더링
        if: steps.collect.outputs.count != '0'
        run: |
          pip install --quiet markdown
          python scripts/render.py

      - name: 리포트 커밋
        if: steps.collect.outputs.count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "리포트 ${{ needs.config.outputs.date }}"
          git push

      - uses: actions/configure-pages@v5
        if: steps.collect.outputs.count != '0'

      - uses: actions/upload-pages-artifact@v3
        if: steps.collect.outputs.count != '0'
        with:
          path: site

      - id: deploy
        if: steps.collect.outputs.count != '0'
        uses: actions/deploy-pages@v4

      - name: 텔레그램 전송
        if: steps.collect.outputs.count != '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PAGE_URL: ${{ steps.deploy.outputs.page_url }}
          DATE: ${{ needs.config.outputs.date }}
        run: |
          for dir in /tmp/artifacts/report-*/; do
            [ -d "$dir" ] || continue
            ticker=$(basename "$dir")
            ticker=${ticker#report-}
            python scripts/notify.py \
              --report "reports/${ticker}/${DATE}.md" \
              --url "${PAGE_URL%/}/${ticker}/${DATE}.html"
          done

      - name: 실패 알림
        if: needs.report.result != 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/notify.py \
            --failure "${{ needs.config.outputs.date }} 리포트 중 일부 또는 전체가 생성되지 않았습니다." \
            --url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
